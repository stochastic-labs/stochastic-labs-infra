services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: stochastic-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - stochastic-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: stochastic-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - stochastic-network

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: stochastic-kafka-init
    depends_on:
      - kafka
    volumes:
      - ./kafka/create-topics.sh:/tmp/create-topics.sh
    entrypoint: sh /tmp/create-topics.sh
    networks:
      - stochastic-network

  mysql:
    image: mysql:8.0
    container_name: stochastic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stochastic_labs_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stochastic-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.90.0
    container_name: stochastic-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - stochastic-network

  loki:
    image: grafana/loki:2.9.0
    container_name: stochastic-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - stochastic-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: stochastic-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - stochastic-network

  postgres:
    image: postgres:15-alpine
    container_name: stochastic-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: stochastic_labs_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stochastic-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stochastic-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
      RABBITMQ_ALLOW_REMOTE_LOGINS_WITH_DEFAULT_USER: "true"
    networks:
      - stochastic-network

  rabbitmq-init:
    image: rabbitmq:3-management-alpine
    container_name: stochastic-rabbitmq-init
    volumes:
      - ./rabbitmq/create-rabbitmq.sh:/tmp/create-rabbitmq.sh
    entrypoint: sh /tmp/create-rabbitmq.sh
    depends_on:
      - rabbitmq
    networks:
      - stochastic-network

networks:
  stochastic-network:
    driver: bridge